services:
  - type: web
    name: ozon-tg-bot
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python run_local.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.12
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: LOG_LEVEL
        value: INFO
      - key: DROP_PENDING_UPDATES
        value: "1"

      - key: TG_BOT_TOKEN
        sync: false
      - key: OZON_CLIENT_ID
        sync: false
      - key: OZON_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_IDS
        sync: false

      # Optional, if write credentials differ from read credentials
      - key: OZON_WRITE_CLIENT_ID
        sync: false
      - key: OZON_WRITE_API_KEY
        sync: false
